name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: codelex-linux-x86_64
          path: target/release/codelex
